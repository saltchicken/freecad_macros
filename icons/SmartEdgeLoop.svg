<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#2d3436"/>

  <!-- 3D Cube Faces -->
  <polygon points="50,52 24,37 50,22 76,37" fill="#747d8c"/>
  <polygon points="50,52 24,37 24,67 50,82" fill="#57606f"/>
  <polygon points="50,52 50,82 76,67 76,37" fill="#1e272e"/>

  <!-- Unselected Solid Edges -->
  <polyline points="24,37 24,67 50,82 76,67 76,37" fill="none" stroke="#a4b0be" stroke-width="3" stroke-linejoin="round"/>
  <line x1="50" y1="52" x2="50" y2="82" stroke="#a4b0be" stroke-width="3" stroke-linecap="round"/>

  <!-- Smart Selected Edge Loop -->
  <polygon points="50,52 24,37 50,22 76,37" fill="none" stroke="#00cec9" stroke-width="5" stroke-linejoin="round"/>

  <!-- Emphasized Vertices (Nodes) -->
  <circle cx="50" cy="52" r="3.5" fill="#00cec9"/>
  <circle cx="24" cy="37" r="3.5" fill="#00cec9"/>
  <circle cx="50" cy="22" r="3.5" fill="#00cec9"/>
  <circle cx="76" cy="37" r="3.5" fill="#00cec9"/>

  <!-- Selection Cursor -->
  <polygon points="35,40 35,64 41,58 46,69 50,67 46,57 52,57" fill="#ffffff" stroke="#2d3436" stroke-width="2" stroke-linejoin="round"/>
</svg>
