<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#2d3436"/>

  <!-- Math / Function Icon (Represents the Scale Equation feature) -->
  <rect x="8" y="8" width="28" height="20" rx="4" fill="#1e272e" stroke="#747d8c" stroke-width="2"/>
  <path d="M 13,18 C 17,10 18,26 22,18 C 26,10 27,26 31,18" fill="none" stroke="#00cec9" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center Sweep Axis -->
  <path d="M 50,15 L 50,85" fill="none" stroke="#57606f" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Bottom Polygon (Base Profile) -->
  <polygon points="50,60 76,70 50,80 24,70" fill="#1e272e" stroke="#00cec9" stroke-width="3" stroke-linejoin="round"/>

  <!-- Back Twist Lines (Drawn behind the shape) -->
  <path d="M 76,28 C 76,44 50,44 50,60" fill="none" stroke="#747d8c" stroke-width="2"/>
  <path d="M 50,18 C 50,44 24,44 24,70" fill="none" stroke="#747d8c" stroke-width="2"/>

  <!-- Mid-Section Wireframe (Represents the intermediate loft sections) -->
  <polygon points="37,44 63,44 63,54 37,54" fill="none" stroke="#57606f" stroke-width="2" stroke-linejoin="round" stroke-dasharray="3,3"/>

  <!-- Front Twist Lines (Sweeping curves) -->
  <path d="M 24,28 C 24,54 50,54 50,80" fill="none" stroke="#00cec9" stroke-width="3"/>
  <path d="M 50,38 C 50,54 76,54 76,70" fill="none" stroke="#00cec9" stroke-width="3"/>

  <!-- Top Polygon (Rotated/Scaled End Profile) -->
  <polygon points="50,18 76,28 50,38 24,28" fill="#2b4749" stroke="#00cec9" stroke-width="3" stroke-linejoin="round"/>

  <!-- Interactive Nodes (Emphasizing the sketch vertexes) -->
  <circle cx="50" cy="18" r="2.5" fill="#ffffff"/>
  <circle cx="76" cy="28" r="2.5" fill="#ffffff"/>
  <circle cx="50" cy="38" r="2.5" fill="#ffffff"/>
  <circle cx="24" cy="28" r="2.5" fill="#ffffff"/>
</svg>
